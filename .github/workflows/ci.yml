name: CI Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run tests
        run: ruby test/app_test.rb

      - name: Generate test report
        if: always()
        run: |
          mkdir -p test/reports
          echo "Test report generated"
          echo "hello world" > 
